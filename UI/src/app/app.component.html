<style>
  :host {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    font-size: 14px;
    color: #333;
    box-sizing: border-box;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  h1,
  h2,
  h3,
  h4,
  h5,
  h6 {
    margin: 8px 0;
  }

  p {
    margin: 0;
  }

  .spacer {
    flex: 1;
  }

  .toolbar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 60px;
    display: flex;
    align-items: center;
    background-color: #ffffff;
    color: rgb(0, 0, 0);
    font-weight: 600;
    z-index: 1;
  }

  .toolbar img {
    margin: 0 16px;
  }

  .content {
    margin: 82px auto 32px;
    padding: 0 16px;
    flex-direction: column;
    align-items: center;
    background-color: #ffffff;
  }

  a,
  a:visited,
  a:hover {
    color: #000000;
    text-decoration: none;
  }

  a:hover {
    color: #ff0000;
  }


  footer {
    margin-top: 8px;
    display: flex;
    align-items: center;
    line-height: 20px;
  }

  footer a {
    display: flex;
    align-items: center;
  }

</style>

<mat-toolbar class="toolbar">
<button mat-icon-button [matMenuTriggerFor]="menu" #menuTrigger="matMenuTrigger">
      <mat-icon>menu</mat-icon>
    </button>

    <button mat-menu-item [routerLink]="'/orders'">

    <button mat-menu-item [routerLink]="'/preview'">
      Vorlauf
    </button>
    <button mat-menu-item [routerLink]="'/bookings'">
      Kasse
    </button>
  </mat-menu>
  

  <span class="toolbar-spacer"></span>

  <img
  class="toolbar-logo"
  width="50"
  alt="VfR Wuerzberg"
  src="https://vfr-würzberg.de/wp-content/themes/vfr-wuerzberg-wordpress/dist/images/vfr-wuerzberg-logo.svg"
/>

</mat-toolbar>
