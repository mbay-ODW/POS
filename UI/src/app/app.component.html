<style>
  :host {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    font-size: 14px;
    color: #333;
    box-sizing: border-box;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  h1,
  h2,
  h3,
  h4,
  h5,
  h6 {
    margin: 8px 0;
  }

  p {
    margin: 0;
  }

  .spacer {
    flex: 1;
  }

  .toolbar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 60px;
    display: flex;
    align-items: center;
    background-color: #ffffff;
    color: rgb(0, 0, 0);
    font-weight: 600;
    z-index: 1;
  }

  .toolbar img {
    margin: 0 16px;
  }

  .content {
    margin: 82px auto 32px;
    padding: 0 16px;
    flex-direction: column;
    align-items: center;
    background-color: #ffffff;
  }

  a,
  a:visited,
  a:hover {
    color: #000000;
    text-decoration: none;
  }

  a:hover {
    color: #ff0000;
  }


  footer {
    margin-top: 8px;
    display: flex;
    align-items: center;
    line-height: 20px;
  }

  footer a {
    display: flex;
    align-items: center;
  }

  .system-name {
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: white;
    margin: 0 8px;
  }

  .toolbar-logo {
    max-height: 40px;
    width: auto;
    object-fit: contain;
  }

  .test-badge {
    background: #f44336;
    color: white;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 10px;
    letter-spacing: 0.05em;
  }

</style>

<mat-toolbar class="toolbar">
<button mat-icon-button [matMenuTriggerFor]="menu" #menuTrigger="matMenuTrigger">
      <mat-icon>menu</mat-icon>
    </button>

  <!-- Navigation Links -->
  <mat-menu #menu="matMenu">
    <button mat-menu-item [routerLink]="'/bookings'">
      <mat-icon>point_of_sale</mat-icon> Kasse
    </button>
    <button mat-menu-item [routerLink]="'/preview'">
      <mat-icon>tv</mat-icon> Vorlauf
    </button>
    <!-- Manager only -->
    <ng-container *ngIf="isManager">
      <mat-divider></mat-divider>
      <button mat-menu-item [routerLink]="'/orders'">
        <mat-icon>receipt_long</mat-icon> Bestellungen
      </button>
      <button mat-menu-item [routerLink]="'/statistics'">
        <mat-icon>bar_chart</mat-icon> Statistik
      </button>
      <mat-divider></mat-divider>
      <button mat-menu-item [routerLink]="'/products'">
        <mat-icon>inventory_2</mat-icon> Produkte
      </button>
      <button mat-menu-item [routerLink]="'/categories'">
        <mat-icon>category</mat-icon> Kategorien
      </button>
      <button mat-menu-item [routerLink]="'/stations'">
        <mat-icon>storefront</mat-icon> Stationen
      </button>
      <mat-divider></mat-divider>
      <button mat-menu-item [routerLink]="'/users'">
        <mat-icon>group</mat-icon> Benutzerverwaltung
      </button>
      <button mat-menu-item [routerLink]="'/settings'">
        <mat-icon>settings</mat-icon> Einstellungen
      </button>
    </ng-container>
  </mat-menu>
  

  <span class="toolbar-spacer"></span>

  <span class="system-name">{{ systemName }}</span>

  <img *ngIf="systemLogo"
    class="toolbar-logo"
    width="50"
    [src]="systemLogo"
    [alt]="systemName"
  />

  <div *ngIf="!isProduction" class="test-badge">TEST</div>

  <span class="toolbar-spacer"></span>

  
  <!-- User Menu -->
  <button mat-icon-button [matMenuTriggerFor]="person">
    <mat-icon>person</mat-icon>
  </button>

  <mat-menu #person="matMenu">
    <div mat-menu-item disabled>
      <mat-icon>{{ isManager ? 'manage_accounts' : 'person' }}</mat-icon>
      <span>{{ currentUser }} · {{ isManager ? 'Manager' : 'Personal' }}</span>
    </div>
    <mat-divider></mat-divider>
    <button mat-menu-item (click)="onLogout()">
      <mat-icon>exit_to_app</mat-icon>
      <span>Abmelden</span>
    </button>
  </mat-menu>
</mat-toolbar>

<!-- Your Content Here -->
<div class="content">




  <router-outlet></router-outlet>
</div>

<!-- Footer -->
<footer>
  <!-- Footer content -->
</footer>
