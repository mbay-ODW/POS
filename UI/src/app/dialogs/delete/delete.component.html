<h2 mat-dialog-title>Löschen</h2>
<mat-dialog-content>Sind Sie sicher, dass Sie {{ data.type }} löschen wollen?</mat-dialog-content>
<mat-dialog-actions>
  <button mat-button (click)="onCancel()">Abbrechen</button>
  <button mat-button color="warn" (click)="onConfirm()">Bestätigen</button>
</mat-dialog-actions>
