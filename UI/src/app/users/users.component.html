<div class="users-page">
  <div class="page-header">
    <h2>Benutzerverwaltung</h2>
    <button mat-raised-button color="primary" (click)="showCreateForm = !showCreateForm">
      <mat-icon>person_add</mat-icon>
      Benutzer anlegen
    </button>
  </div>

  <!-- Create Form -->
  <mat-card class="create-card" *ngIf="showCreateForm">
    <mat-card-header><mat-card-title>Neuer Benutzer</mat-card-title></mat-card-header>
    <mat-card-content>
      <form [formGroup]="createForm" (ngSubmit)="create()" class="create-form">
        <mat-form-field appearance="outline">
          <mat-label>Benutzername</mat-label>
          <input matInput formControlName="username" autocomplete="off">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Passwort</mat-label>
          <input matInput formControlName="password"
                 [type]="hidePassword ? 'password' : 'text'"
                 autocomplete="new-password">
          <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Rolle</mat-label>
          <mat-select formControlName="role">
            <mat-option value="personal">Personal</mat-option>
            <mat-option value="manager">Manager</mat-option>
          </mat-select>
        </mat-form-field>

        <div class="form-actions">
          <button mat-raised-button color="primary" type="submit" [disabled]="createForm.invalid">
            Anlegen
          </button>
          <button mat-button type="button" (click)="showCreateForm = false">Abbrechen</button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>

  <!-- Users Table -->
  <mat-card>
    <mat-spinner *ngIf="isLoading" diameter="40" class="spinner"></mat-spinner>

    <table mat-table [dataSource]="users" class="users-table" *ngIf="!isLoading">

      <ng-container matColumnDef="username">
        <th mat-header-cell *matHeaderCellDef>Benutzername</th>
        <td mat-cell *matCellDef="let u">
          <mat-icon class="role-icon" [class.manager]="u.role === 'manager'">
            {{ u.role === 'manager' ? 'manage_accounts' : 'person' }}
          </mat-icon>
          {{ u.username }}
        </td>
      </ng-container>

      <ng-container matColumnDef="role">
        <th mat-header-cell *matHeaderCellDef>Rolle</th>
        <td mat-cell *matCellDef="let u">
          <mat-select [(value)]="u.role" (selectionChange)="changeRole(u, $event.value)"
                      class="role-select">
            <mat-option value="personal">Personal</mat-option>
            <mat-option value="manager">Manager</mat-option>
          </mat-select>
        </td>
      </ng-container>

      <ng-container matColumnDef="active">
        <th mat-header-cell *matHeaderCellDef>Aktiv</th>
        <td mat-cell *matCellDef="let u">
          <mat-slide-toggle [checked]="u.active" (change)="toggleActive(u)"></mat-slide-toggle>
        </td>
      </ng-container>

      <ng-container matColumnDef="lastLogin">
        <th mat-header-cell *matHeaderCellDef>Letzter Login</th>
        <td mat-cell *matCellDef="let u">
          {{ u.lastLogin ? (u.lastLogin | date:'dd.MM.yyyy HH:mm') : '—' }}
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Aktionen</th>
        <td mat-cell *matCellDef="let u">
          <button mat-icon-button color="warn" (click)="delete(u)" matTooltip="Löschen">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </mat-card>
</div>
