<button mat-icon-button class="close-button" (click)="onClose()">
    <mat-icon>close</mat-icon>
</button>
<div align="center">
    <mat-card class="view-card">
        <mat-card-header>
            <!-- Header Content -->
        </mat-card-header>
        <mat-card-content>
            
        
            <div class="form-section">
                <mat-form-field class="form-field">
                    <mat-label>Name</mat-label>
                    <input matInput [value]="data.categoryItem.name" readonly>
                </mat-form-field>
            </div>

           

            <!-- Other Note Fields -->
            <div class="form-section">
                <mat-form-field class="form-field">
                    <mat-label>Letzte Änderung</mat-label>
                    <input matInput [value]="data.categoryItem.lastModified | date:'medium'" readonly>
                </mat-form-field>
            </div>

            <div class="form-section">
                <mat-form-field class="form-field">
                    <mat-label>Erzeugt am</mat-label>
                    <input matInput [value]="data.categoryItem.creationTime | date:'medium'" readonly>
                </mat-form-field>
            </div>

            <div class="form-section">
                <mat-form-field class="form-field">
                    <mat-label>Erzeugt von</mat-label>
                    <input matInput [value]="data.categoryItem.createdBy" readonly>
                </mat-form-field>
            </div>
    
            <div class="form-section">
                <mat-form-field class="form-field">
                    <mat-label>Letzter Berbeiter </mat-label>
                    <input matInput [value]="data.categoryItem.modifiedBy" readonly>
                </mat-form-field>
            </div>

        </mat-card-content>
        <mat-card-actions>
            <button mat-raised-button color="warn" (click)="onClose()">Schließen</button>
        </mat-card-actions>
    </mat-card>
</div>
