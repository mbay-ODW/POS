<div class="mat-elevation-z8">
  <div class="toolbar" style="display: flex; justify-content: space-between;">
    <h2>Einstellungen</h2>
    <button mat-raised-button color="primary" (click)="editSetting()">Einstellung hinzufügen</button>
    <button mat-button (click)="refresh()"><mat-icon>refresh</mat-icon></button>
  </div>

  <mat-table [dataSource]="dataSource" matSort class="mat-elevation-z8">


  <div class="spinner-container">
    <mat-spinner *ngIf="isLoading"></mat-spinner>
    </div>

    <ng-container matColumnDef="name">
      <mat-header-cell *matHeaderCellDef mat-sort-header> Name </mat-header-cell>
      <mat-cell *matCellDef="let setting"> {{ setting.name }} </mat-cell>
    </ng-container>

    <ng-container matColumnDef="description">
      <mat-header-cell *matHeaderCellDef> Beschreibung </mat-header-cell>
      <mat-cell *matCellDef="let setting"> {{ setting.description }} </mat-cell>
    </ng-container>

    <ng-container matColumnDef="value">
      <mat-header-cell *matHeaderCellDef> Wert </mat-header-cell>
      <mat-cell *matCellDef="let setting"> {{ setting.value }} </mat-cell>
    </ng-container>

    <ng-container matColumnDef="actions">
      <mat-header-cell *matHeaderCellDef> Aktion </mat-header-cell>
      <mat-cell *matCellDef="let setting">
        <button mat-icon-button color="accent" (click)="editSetting(setting._id)">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="viewSetting(setting._id)">
          <mat-icon>info</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="deleteSetting(setting._id)">
          <mat-icon>delete</mat-icon>
        </button>
        
      </mat-cell>
    </ng-container>

    <mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></mat-header-row>
    <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row>
  </mat-table>

  <div class="center-content">
    <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons></mat-paginator>
  </div>
    
</div>
