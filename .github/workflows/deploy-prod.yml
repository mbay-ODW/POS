name: Deploy to Server for Production

on:
  workflow_dispatch:

jobs:
  Build_images:
    uses: ./.github/workflows/build-docker-images.yml

  API_Testing:
    needs: [Build_images]
    uses: ./.github/workflows/API-Testing.yml
    secrets: inherit

  deploy-prod:
    runs-on: ubuntu-latest
    needs: [API_Testing]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Save SSH private key
        run: echo "${{ secrets.SSH_PRIVATE_KEY }}" > private_key.pem

      - name: Deploy to Server
        run: |
          chmod 600 private_key.pem
          ssh -o StrictHostKeyChecking=no -i private_key.pem git@${{ secrets.SSH_SERVER }} -p 5022 \
            "cd /home/git/Production/POS && docker-compose -p POS_prod down && git pull && docker-compose -p POS_prod up --build -d"

  Test_Security_Prod:
    uses: ./.github/workflows/Security-Testing-Prod.yml
    needs: [deploy-prod]
