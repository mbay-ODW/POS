name: Security Testing for Production

on: [workflow_call]

jobs:
  Connection_and_API_Testing:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Wait for deployment to be ready to run
      run: sleep 60
    - name: Install dependencies in os
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
    - name: Run Testing booking
      run: pytest Testing/Security/prod/bookings.py